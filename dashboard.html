    <script>
        // Check Auth
        const userInfo = JSON.parse(localStorage.getItem('userInfo'));
        if (!userInfo || !userInfo.token) {
            window.location.href = 'login.html';
        }
        document.getElementById('adminName').textContent = `Welcome, ${userInfo.name}`;

        // Navigation
        function showSection(sectionId) {
            document.querySelectorAll('.main-content > div').forEach(div => div.style.display = 'none');
            document.getElementById(`${sectionId}-section`).style.display = 'block';
            
            document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active');

            if(sectionId === 'messages') loadMessages();
            if(sectionId === 'jobs') loadJobs();
        }

        // Job Modal
        function showJobModal() {
            document.getElementById('jobModal').style.display = 'flex';
        }

        function closeJobModal() {
            document.getElementById('jobModal').style.display = 'none';
        }

        document.getElementById('jobForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const jobData = {
                title: document.getElementById('jobTitle').value,
                department: document.getElementById('jobDepartment').value,
                description: document.getElementById('jobDescription').value,
                requirements: document.getElementById('jobRequirements').value,
                closingDate: document.getElementById('jobClosingDate').value
            };

            try {
                const res = await fetch('/api/jobs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${userInfo.token}`
                    },
                    body: JSON.stringify(jobData)
                });

                if (res.ok) {
                    alert('Job posted successfully!');
                    closeJobModal();
                    loadJobs();
                    e.target.reset();
                } else {
                    alert('Failed to post job');
                }
            } catch (err) {
                console.error(err);
                alert('Error posting job');
            }
        });

        // Load Messages
        async function loadMessages() {
            try {
                const res = await fetch('/api/messages', {
                    headers: { 'Authorization': `Bearer ${userInfo.token}` }
                });
                const messages = await res.json();
                const tbody = document.getElementById('messagesTableBody');
                tbody.innerHTML = messages.map(msg => `
                    <tr>
                        <td>${new Date(msg.createdAt).toLocaleDateString()}</td>
                        <td>${msg.fullName}<br><small>${msg.phone}</small></td>
                        <td>${msg.serviceType || '-'}</td>
                        <td>${msg.message.substring(0, 50)}...</td>
                        <td><span class="badge ${msg.status === 'new' ? 'badge-new' : 'badge-read'}">${msg.status}</span></td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        // Load Jobs
        async function loadJobs() {
            try {
                const res = await fetch('/api/jobs');
                const jobs = await res.json();
                const tbody = document.getElementById('jobsTableBody');
                tbody.innerHTML = jobs.map(job => `
                    <tr>
                        <td>${job.title}</td>
                        <td>${job.department || '-'}</td>
                        <td>${job.closingDate || '-'}</td>
                        <td><span class="badge badge-read">${job.status}</span></td>
                        <td><button class="btn btn-sm btn-outline">Edit</button></td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        function logout() {
            localStorage.removeItem('userInfo');
            window.location.href = 'login.html';
        }

        // Initial Load
        loadMessages(); 
    </script>
