<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | InfoMineral</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="style.css">

<body style="background-color: #f7fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <div style="background: white; padding: 3rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 400px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-family: var(--font-serif); font-size: 1.5rem; color: var(--primary);">Admin Portal</h1>
            <p style="color: var(--text-light);">InfoMineral</p>
            <p style="font-size: 0.8rem; color: #718096; margin-top: 0.5rem;">Please sign in to continue</p>
        </div>

        <form  id="loginForm"  method="POST" action="survey.php">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" class="form-control" required placeholder="infomineral@protonmail.com">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <div id="loginError" style="color: #e53e3e; font-size: 0.875rem; margin-bottom: 1rem; text-align: center; min-height: 1.25rem;"></div>
            <button type="submit" id="loginBtn" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
    </div>
